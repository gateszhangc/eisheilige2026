apiVersion: apps/v1
kind: Deployment
metadata:
  name: eisheilige2026
  labels:
    app.kubernetes.io/name: eisheilige2026
    app.kubernetes.io/part-of: eisheilige2026
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: eisheilige2026
      app.kubernetes.io/part-of: eisheilige2026
  template:
    metadata:
      labels:
        app.kubernetes.io/name: eisheilige2026
        app.kubernetes.io/part-of: eisheilige2026
    spec:
      imagePullSecrets:
        - name: dokploy-fleet-ghcr
      containers:
        - name: web
          image: registry.144.91.77.245.sslip.io/eisheilige2026:bootstrap
          imagePullPolicy: IfNotPresent
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: HOSTNAME
              value: 0.0.0.0
          ports:
            - name: http
              containerPort: 3000
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            failureThreshold: 30
            periodSeconds: 5
